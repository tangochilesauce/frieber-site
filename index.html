<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dan Frieber</title>
  <meta name="description" content="Dan Frieber — Serial Mastery.">
  <meta name="theme-color" content="#0044aa">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root {
      --bg: #0044aa;
      --text: #ffffff;
    }

    html {
      font-size: 14px;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: unset;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Silkscreen', monospace;
      font-weight: 700;
      line-height: 2;
      min-height: 100dvh;
    }

    .layout {
      display: flex;
      gap: 4rem;
      padding: 3rem 2rem;
    }

    .col {
      flex: 1;
      min-width: 0;
    }

    /* ── Pixel Logo ── */

    .logo-wrap {
      margin-bottom: 2.5rem;
      height: 80px;
      position: relative;
    }

    #pixel-logo {
      position: relative;
      display: inline-block;
    }

    .px {
      position: absolute;
      width: var(--size);
      height: var(--size);
      background: var(--text);
      opacity: 0;
      transform: translate(var(--sx), var(--sy)) scale(0);
      transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                  opacity 0.5s ease;
      transition-delay: var(--d);
    }

    .px.land {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }

    #sampler { display: none; }

    /* ── Content ── */

    .section-label {
      margin-top: 2.5rem;
      margin-bottom: 1rem;
    }

    .projects {
      list-style: none;
      margin-bottom: 2.5rem;
    }

    .projects li {
      margin-bottom: 0.25rem;
    }

    .previously {
      margin-bottom: 2.5rem;
    }

    /* ── Links ── */

    a {
      color: var(--text);
      text-decoration: none;
      transition: opacity 0.15s ease;
    }

    a:hover {
      opacity: 0.5;
    }

    /* ── Right Column ── */

    .links {
      list-style: none;
      margin-top: 0.25rem;
    }

    .links li {
      margin-bottom: 0.25rem;
    }

    /* ── Entrance ── */

    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .a { opacity: 0; animation: up 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .a1 { animation-delay: 0.6s; }
    .a2 { animation-delay: 0.75s; }
    .a3 { animation-delay: 0.9s; }

    @media (max-width: 640px) {
      .layout { flex-direction: column; gap: 3rem; }
      html { font-size: 12px; }
      .layout { padding: 2rem 1.5rem; }
      .logo-wrap { height: 60px; }
    }
  </style>
</head>
<body>
  <div class="layout">

    <main class="col">
      <div class="logo-wrap">
        <div id="pixel-logo"></div>
      </div>

      <canvas id="sampler"></canvas>
      <img id="logo-src" src="logo.jpg" alt="" crossorigin="anonymous" style="display:none">

      <p class="a a1">Dan Frieber</p>
      <p class="a a1">Serial Mastery</p>

      <p class="section-label a a1">Currently working on:</p>

      <ul class="projects a a1">
        <li><a href="https://tangochilesauce.com" target="_blank" rel="noopener">Tango Chile Sauce</a></li>
        <li><a href="#">FFEEDD</a></li>
        <li><a href="#">Madder</a></li>
        <li><a href="#">Dream Beds</a></li>
      </ul>

      <p class="previously a a2">Previously: Food Network Chopped, HBO High Maintenance, Cleanmarket x Equinox, Whole Foods NYC, Chamusca NYC</p>

      <div class="a a3">
        <a href="mailto:dan@frieber.com">dan@frieber.com</a>
      </div>
    </main>

    <aside class="col a a2">
      <p>Dan Frieber</p>
      <ul class="links">
        <li><a href="https://instagram.com/frieber" target="_blank" rel="noopener">@frieber</a></li>
        <li><a href="https://linkedin.com/in/danfrieber" target="_blank" rel="noopener">LinkedIn</a></li>
        <li><a href="#" target="_blank" rel="noopener">YouTube</a></li>
      </ul>
    </aside>

  </div>

  <script>
    const img = document.getElementById('logo-src');
    const canvas = document.getElementById('sampler');
    const container = document.getElementById('pixel-logo');

    function buildPixels() {
      const ctx = canvas.getContext('2d');

      const resolution = 24;
      const aspect = img.naturalWidth / img.naturalHeight;
      const cols = Math.round(resolution * aspect);
      const rows = resolution;

      canvas.width = cols;
      canvas.height = rows;
      ctx.drawImage(img, 0, 0, cols, rows);

      const data = ctx.getImageData(0, 0, cols, rows).data;
      const isMobile = window.innerWidth <= 480;
      const pxSize = isMobile ? 3 : 4;
      const gap = 1;
      const step = pxSize + gap;

      container.style.width = (cols * step) + 'px';
      container.style.height = (rows * step) + 'px';

      const pixels = [];

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const i = (y * cols + x) * 4;
          const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];

          const brightness = (r + g + b) / 3;
          if (brightness > 140 || a < 128) continue;

          const el = document.createElement('div');
          el.className = 'px';

          const fx = x * step;
          const fy = y * step;
          el.style.left = fx + 'px';
          el.style.top = fy + 'px';
          el.style.setProperty('--size', pxSize + 'px');

          const angle = Math.random() * Math.PI * 2;
          const dist = 60 + Math.random() * 120;
          el.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
          el.style.setProperty('--sy', Math.sin(angle) * dist + 'px');

          const diag = (x + y) / (cols + rows);
          el.style.setProperty('--d', (diag * 0.4 + Math.random() * 0.08) + 's');

          const alpha = Math.min(1, (200 - brightness) / 160);
          el.style.opacity = 0;
          el.dataset.alpha = alpha;

          container.appendChild(el);
          pixels.push(el);
        }
      }

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          pixels.forEach(el => {
            el.classList.add('land');
            el.style.opacity = el.dataset.alpha;
          });
        });
      });
    }

    if (img.complete && img.naturalWidth > 0) {
      buildPixels();
    } else {
      img.onload = buildPixels;
    }
  </script>
</body>
</html>
